# ─────────────────────────────────────────────────────────────────────────────
# Edge security headers (the app/middleware also sets a subset; these harden the
# proxy layer). `always` ensures they apply to error responses too.
# ─────────────────────────────────────────────────────────────────────────────
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-XSS-Protection "0" always;

# Content-Security-Policy is intentionally left commented: Next.js ships inline
# runtime scripts/styles, so enable + tighten this only after verifying the app
# renders correctly with it.
# add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'" always;
