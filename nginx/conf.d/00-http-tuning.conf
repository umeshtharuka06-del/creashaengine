# ─────────────────────────────────────────────────────────────────────────────
# HTTP-context tuning shared by all server blocks (loaded inside http{} because
# /etc/nginx/conf.d/*.conf is included from the stock nginx.conf http block).
# ─────────────────────────────────────────────────────────────────────────────

# Restore the real visitor IP from Cloudflare before any rate-limit keying.
include /etc/nginx/snippets/cloudflare-realip.conf;

# ── Compression ─────────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/xml+rss
    application/wasm
    image/svg+xml
    font/woff2;

# ── WebSocket upgrade mapping ───────────────────────────────────────────────
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Rate-limiting zones (keyed on the real client IP) ───────────────────────
# General browsing, API traffic, and (stricter) auth endpoints.
limit_req_zone  $binary_remote_addr  zone=req_general:10m  rate=20r/s;
limit_req_zone  $binary_remote_addr  zone=req_api:10m      rate=10r/s;
limit_req_zone  $binary_remote_addr  zone=req_auth:10m     rate=5r/m;
limit_conn_zone $binary_remote_addr  zone=conn_per_ip:10m;
limit_req_status 429;
limit_conn_status 429;

# ── Proxy cache for cacheable upstream responses (e.g. immutable build assets) ─
proxy_cache_path /var/cache/nginx/royal1 levels=1:2 keys_zone=royal1_cache:10m
                 max_size=512m inactive=60m use_temp_path=off;

# Don't leak the upstream server token.
server_tokens off;
