# ─────────────────────────────────────────────────────────────────────────────
# Royal 1 — Nginx origin server (behind Cloudflare).
#
# This file is BAKED INTO the nginx image (see nginx/Dockerfile), not bind-mounted
# from the host, so it is always present regardless of how the stack is deployed
# (Portainer Git stack, Web editor, or plain `docker compose up`).
#
# Cloudflare terminates TLS at the edge, so :80 serves the app directly (and the
# ACME http-01 challenge). :443 also proxies the app for direct-origin TLS /
# Cloudflare "Full" mode; its certificate is seeded self-signed on first boot and
# replaced by the real Let's Encrypt cert via deploy/init-letsencrypt.sh.
# HTTP-context tuning (gzip, rate-limit zones, realip, cache) lives in
# 00-http-tuning.conf; reusable snippets live in nginx/snippets/.
# ─────────────────────────────────────────────────────────────────────────────

# ── HTTP :80 — ACME challenge + reverse proxy to the Next.js web container ────
server {
    listen 80;
    listen [::]:80;
    server_name mega99.xyz www.mega99.xyz;

    # Container-internal healthcheck (used by the nginx service healthcheck).
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # Let's Encrypt webroot challenge.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Large uploads (deposit screenshots, etc.).
    client_max_body_size 25m;
    client_body_timeout  30s;

    # ── Immutable Next.js build assets — long cache + proxy cache ────────────
    location /_next/static/ {
        proxy_pass http://web:3000;
        include /etc/nginx/snippets/proxy-headers.conf;
        proxy_cache royal1_cache;
        proxy_cache_valid 200 60m;
        proxy_ignore_headers Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Cache-Status $upstream_cache_status;
    }

    location /_next/image {
        proxy_pass http://web:3000;
        include /etc/nginx/snippets/proxy-headers.conf;
        proxy_cache royal1_cache;
        proxy_cache_valid 200 60m;
    }

    # ── Auth endpoints — strictest rate limit ───────────────────────────────
    location ~ ^/api/auth/(login|register|password) {
        limit_req zone=req_auth burst=10 nodelay;
        proxy_pass http://web:3000;
        include /etc/nginx/snippets/proxy-headers.conf;
    }

    # ── API ─────────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=req_api burst=20 nodelay;
        proxy_pass http://web:3000;
        include /etc/nginx/snippets/proxy-headers.conf;
    }

    # ── Everything else (HTML pages, WebSocket) ─────────────────────────────
    location / {
        limit_req zone=req_general burst=40 nodelay;
        proxy_pass http://web:3000;
        include /etc/nginx/snippets/proxy-headers.conf;
    }
}

# ── HTTPS :443 — reverse proxy to the Next.js web container ──────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name mega99.xyz www.mega99.xyz;

    # Seeded self-signed on first boot; replaced by the real cert via Certbot.
    ssl_certificate /etc/letsencrypt/live/mega99.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mega99.xyz/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;
    include /etc/nginx/snippets/security-headers.conf;

    # Large uploads (deposit screenshots, etc.).
    client_max_body_size 25m;
    client_body_timeout  30s;

    # Cap concurrent connections per IP.
    limit_conn conn_per_ip 50;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Immutable Next.js build assets — long cache + proxy cache ────────────
    location /_next/static/ {
        proxy_pass http://web:3000;
        include /etc/nginx/snippets/proxy-headers.conf;
        proxy_cache royal1_cache;
        proxy_cache_valid 200 60m;
        proxy_ignore_headers Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Cache-Status $upstream_cache_status;
    }

    location /_next/image {
        proxy_pass http://web:3000;
        include /etc/nginx/snippets/proxy-headers.conf;
        proxy_cache royal1_cache;
        proxy_cache_valid 200 60m;
    }

    location = /favicon.ico { proxy_pass http://web:3000; include /etc/nginx/snippets/proxy-headers.conf; access_log off; expires 7d; }
    location = /manifest.webmanifest { proxy_pass http://web:3000; include /etc/nginx/snippets/proxy-headers.conf; }

    # ── Auth endpoints — strictest rate limit ───────────────────────────────
    location ~ ^/api/auth/(login|register|password) {
        limit_req zone=req_auth burst=10 nodelay;
        proxy_pass http://web:3000;
        include /etc/nginx/snippets/proxy-headers.conf;
    }

    # ── API ─────────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=req_api burst=20 nodelay;
        proxy_pass http://web:3000;
        include /etc/nginx/snippets/proxy-headers.conf;
    }

    # ── Everything else (HTML pages, WebSocket) ─────────────────────────────
    location / {
        limit_req zone=req_general burst=40 nodelay;
        proxy_pass http://web:3000;
        include /etc/nginx/snippets/proxy-headers.conf;
    }
}
