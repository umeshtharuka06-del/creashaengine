# ─────────────────────────────────────────────────────────────────────────────
# Royal 1 — Redis configuration.
#
# This Redis is a DURABLE JOB QUEUE (telegram / withdraw workers), not a cache.
# Persistence is enabled and eviction is DISABLED so jobs are never silently
# dropped under memory pressure.
# ─────────────────────────────────────────────────────────────────────────────

bind 0.0.0.0
protected-mode no            # network isolation is provided by the Docker bridge
port 6379

# ── Persistence: AOF (append-only) + periodic RDB snapshots ─────────────────
appendonly yes
appendfsync everysec
appendfilename "appendonly.aof"
dir /data

save 900 1
save 300 10
save 60 10000
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
stop-writes-on-bgsave-error yes

# ── Memory: never evict queued jobs ─────────────────────────────────────────
maxmemory-policy noeviction

# ── Logging ─────────────────────────────────────────────────────────────────
loglevel notice
