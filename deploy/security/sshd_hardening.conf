# Royal 1 — SSH hardening drop-in (/etc/ssh/sshd_config.d/99-royal1-hardening.conf)
# ⚠ Requires key-based auth to be working first — password login is disabled.

# Key-based auth only.
PubkeyAuthentication yes
PasswordAuthentication no
PermitEmptyPasswords no
KbdInteractiveAuthentication no
ChallengeResponseAuthentication no

# Root may log in with a key only (set to "no" to forbid entirely).
PermitRootLogin prohibit-password

# Reduce brute-force surface.
MaxAuthTries 3
MaxSessions 5
LoginGraceTime 30

# Drop idle/dead sessions.
ClientAliveInterval 300
ClientAliveCountMax 2

# Disable rarely-needed, higher-risk features.
X11Forwarding no
AllowAgentForwarding no
AllowTcpForwarding no
PermitTunnel no
